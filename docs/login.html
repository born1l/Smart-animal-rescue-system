

  <!DOCTYPE html>
<html>
<head>
  <title>Login - Animal Rescue</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <h1 class="brand-title">FurEver Safe 🐾</h1>
<p class="tagline">Because every paw deserves protection</p>
    <div class="role-selector">
      <button type="button" class="role-btn" data-role="user">User</button>
      <button type="button" class="role-btn" data-role="volunteer">Volunteer</button>
      <button type="button" class="role-btn" data-role="admin">Admin</button>
    </div>

    <form id="loginForm">
      <input type="text" id="name" placeholder="Name" required>
      <input type="text" id="phone" placeholder="Phone Number" required>

      <div id="extraFields"></div>

      <button type="submit">Login</button>
    </form>

  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
