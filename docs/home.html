<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FurEver Safe — Home</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    .dashboard-wrapper { max-width: 900px; margin: 30px auto; padding: 0 20px; }
    .welcome-box { background: #fff; border-radius: 12px; padding: 20px 25px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .welcome-box h2 { margin: 0 0 5px; color: #2d6a4f; }
    .welcome-box p { margin: 0; color: #666; }
    .action-btn { background: #2d6a4f; color: white; border: none; padding: 10px 22px; border-radius: 8px; cursor: pointer; font-size: 15px; margin-top: 15px; text-decoration: none; display: inline-block; }
    .action-btn:hover { background: #1b4332; }
    .reports-section { background: #fff; border-radius: 12px; padding: 20px 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .reports-section h3 { color: #2d6a4f; margin-top: 0; }
    .report-card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 12px; }
    .report-card h4 { margin: 0 0 6px; }
    .report-card p { margin: 3px 0; color: #555; font-size: 14px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .badge.open { background: #fff3cd; color: #856404; }
    .badge.in-progress { background: #cce5ff; color: #004085; }
    .badge.rescued { background: #d4edda; color: #155724; }
    .empty-msg { color: #999; text-align: center; padding: 30px 0; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .logout-btn { background: #e63946; color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="logo">FurEver Safe 🐾</div>
    <ul class="nav-links">
      <li class="active"><a href="home.html">Home</a></li>
      <li><a href="report.html">Report Animal</a></li>
      <li><a href="profile.html">Profile</a></li>
    </ul>
  </nav>

  <div class="dashboard-wrapper">
    <div class="top-bar">
      <div class="welcome-box" style="flex:1; margin-bottom:0; margin-right:15px;">
        <h2>Welcome back, <span id="userName">there</span> 👋</h2>
        <p>Help an animal in need — report a stray or injured animal near you.</p>
        <a href="report.html" class="action-btn">+ Report an Animal</a>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="reports-section" style="margin-top:20px;">
      <h3>Your Reports</h3>
      <div id="reportList"><p class="empty-msg">Loading your reports...</p></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    const BASE_URL = "http://localhost:5005";

    // Redirect to login if not logged in
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");
    if (!token) window.location.href = "login.html";

    // Show name
    document.getElementById("userName").textContent = user.name || "there";

    // Fetch reports
    async function loadReports() {
      try {
        const res = await fetch(`${BASE_URL}/api/reports/mine`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const reports = await res.json();
        const list = document.getElementById("reportList");

        if (!reports.length) {
          list.innerHTML = `<p class="empty-msg">You haven't reported any animals yet.</p>`;
          return;
        }

        list.innerHTML = reports.map(r => `
          <div class="report-card">
            <h4>${r.animalType} — ${r.location}</h4>
            <p>Urgency: ${r.urgency}</p>
            <p>Reported: ${new Date(r.createdAt).toLocaleDateString()}</p>
            <span class="badge ${r.status}">${r.status}</span>
          </div>
        `).join("");
      } catch {
        document.getElementById("reportList").innerHTML = `<p class="empty-msg">Could not load reports.</p>`;
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    loadReports();
  </script>
</body>
</html>
